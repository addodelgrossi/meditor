<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline'; img-src data: blob:; font-src data:; connect-src 'none';">
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: transparent; }
    body { user-select: none; cursor: grab; }
    body.dragging { cursor: grabbing; }
    body.static { cursor: default; }
    #viewport { position: absolute; inset: 0; overflow: hidden; }
    #diagram {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 0 0;
      will-change: transform, width, height;
      transition: opacity 160ms ease;
    }
    #diagram svg {
      display: block;
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      overflow: visible;
      shape-rendering: geometricPrecision;
      text-rendering: optimizeLegibility;
    }
    #diagram .meditor-highlight-target { transition: opacity 160ms ease, filter 160ms ease; }
    body.presentation #diagram { transition: opacity 160ms ease, width 120ms ease, height 120ms ease; }
    #diagram.meditor-has-highlight .meditor-highlight-target { opacity: 0.22; }
    #diagram.meditor-has-highlight .meditor-highlighted {
      opacity: 1;
      filter: drop-shadow(0 0 8px rgba(82, 210, 220, 0.8));
    }
  </style>
</head>
<body>
  <div id="viewport"><div id="diagram"></div></div>
  <script src="mermaid.min.js"></script>
  <script>
    (() => {
      const graph = document.getElementById("diagram");
      let scale = 1;
      let offsetX = 0;
      let offsetY = 0;
      let dragging = false;
      let pointerX = 0;
      let pointerY = 0;
      let naturalWidth = 0;
      let naturalHeight = 0;
      let hasRendered = false;
      let interactive = true;
      let highlightSelector = [
        "g.node", "g.cluster", ".actor", "g[class*='participant']",
        "g[class*='classGroup']", "g[class*='stateGroup']", "g[class*='entityBox']",
        ".task", "g.mindmap-node", "g.person-man", "g[class*='architecture']",
        "g[class*='service']", "g[class*='wardley-node']"
      ].join(",");
      let highlightable = false;
      let movedSincePointerDown = false;
      let transformFrame = null;
      let lastInteractionPost = 0;

      const post = payload => window.webkit.messageHandlers.meditor.postMessage(payload);
      const postInteraction = () => {
        const now = Date.now();
        if (highlightable && now - lastInteractionPost > 250) {
          lastInteractionPost = now;
          post({ event: "interaction" });
        }
      };
      const transform = () => {
        transformFrame = null;
        const width = Math.max(naturalWidth * scale, 1);
        const height = Math.max(naturalHeight * scale, 1);
        graph.style.width = `${width}px`;
        graph.style.height = `${height}px`;
        graph.style.transform = `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px))`;
      };
      const scheduleTransform = () => {
        if (!transformFrame) transformFrame = requestAnimationFrame(transform);
      };
      const clearHighlight = () => {
        graph.classList.remove("meditor-has-highlight");
        graph.querySelectorAll(".meditor-highlighted").forEach(element => {
          element.classList.remove("meditor-highlighted");
        });
      };
      const prepareHighlights = () => {
        graph.querySelectorAll(".meditor-highlight-target").forEach(element => {
          element.classList.remove("meditor-highlight-target", "meditor-highlighted");
        });
        if (!highlightable) return;
        graph.querySelectorAll(highlightSelector).forEach(element => {
          element.classList.add("meditor-highlight-target");
        });
      };
      const highlight = element => {
        clearHighlight();
        if (!element) return;
        element.classList.add("meditor-highlighted");
        graph.classList.add("meditor-has-highlight");
      };
      const dimensions = svg => {
        const box = svg.viewBox && svg.viewBox.baseVal;
        return {
          width: Number(box && box.width ? box.width : svg.getBoundingClientRect().width),
          height: Number(box && box.height ? box.height : svg.getBoundingClientRect().height)
        };
      };
      const fitScale = maxScale => {
        if (!naturalWidth || !naturalHeight) return 1;
        const padding = 64;
        return Math.max(
          Math.min(
            (window.innerWidth - padding) / naturalWidth,
            (window.innerHeight - padding) / naturalHeight,
            maxScale
          ),
          interactive ? 0.08 : 0.001
        );
      };
      const fit = maxScale => {
        scale = fitScale(maxScale);
        offsetX = 0;
        offsetY = 0;
        transform();
      };
      const errorLocation = error => {
        const loc = error && error.hash && error.hash.loc;
        return {
          line: Number(loc && (loc.first_line || loc.line)) || null,
          column: Number(loc && (loc.first_column || loc.column)) || null
        };
      };
      const errorMessage = error => {
        const raw = String(error && (error.str || error.message) || error || "Unable to render diagram");
        return raw.split("\n")[0].replace(/^Error:\s*/, "");
      };
      const values = value => {
        if (value instanceof Map) return [...value.values()];
        if (Array.isArray(value)) return value;
        if (value && typeof value === "object") return Object.values(value);
        return [];
      };
      const entries = value => {
        if (value instanceof Map) return [...value.entries()];
        if (value && typeof value === "object") return Object.entries(value);
        return [];
      };
      const label = (value, fallback) => {
        const candidate = value && (
          value.text || value.label || value.description || value.name ||
          value.title || value.descr || value.id
        );
        if (typeof candidate === "string" && candidate.trim()) return candidate.trim();
        if (candidate && typeof candidate.text === "string") return candidate.text.trim();
        return String(fallback || "");
      };
      const item = (kind, id, value, children = []) => ({
        id: `${kind}:${id}`,
        identifier: String(id),
        title: label(value, id),
        kind,
        children,
        line: null
      });
      const connection = (id, from, to, text) => ({
        id: String(id),
        from: String(from),
        to: String(to),
        label: text ? String(text) : null
      });
      const parentIdentifier = value => {
        const candidate = value && (
          value.parent || value.parentId || value.group || value.groupId || value.in
        );
        if (typeof candidate === "string" || typeof candidate === "number") return String(candidate);
        if (candidate && (candidate.id || candidate.identifier)) {
          return String(candidate.id || candidate.identifier);
        }
        return null;
      };
      const normalizeAnalysis = diagram => {
        const db = diagram.db;
        let outline = [];
        let connections = [];
        let elementCount = null;
        let connectionCount = null;

        if (diagram.type.startsWith("flowchart")) {
          const vertices = entries(db.getVertices());
          const nodeById = new Map(vertices.map(([id, value]) => [String(id), item("node", id, value)]));
          const grouped = new Set();
          const groups = values(db.getSubGraphs()).map(group => {
            const children = values(group.nodes).map(id => {
              grouped.add(String(id));
              return nodeById.get(String(id));
            }).filter(Boolean);
            return item("subgraph", group.id, { title: group.title }, children);
          });
          outline = [...groups, ...[...nodeById.entries()].filter(([id]) => !grouped.has(id)).map(([, node]) => node)];
          connections = values(db.getEdges()).map((edge, index) =>
            connection(edge.id || `edge:${index}`, edge.start, edge.end, edge.text)
          );
          elementCount = vertices.length;
          connectionCount = connections.length;
        } else if (diagram.type === "sequence") {
          outline = entries(db.getActors()).map(([id, actor]) =>
            item(actor.type === "actor" ? "actor" : "participant", id, actor)
          );
          connections = values(db.getMessages()).filter(message => message.from && message.to).map((message, index) =>
            connection(message.id || `message:${index}`, message.from, message.to, message.message)
          );
          elementCount = outline.length;
          connectionCount = connections.length;
        } else if (diagram.type === "class") {
          outline = entries(db.getClasses()).map(([id, value]) => item("class", id, value));
          connections = values(db.getRelations()).map((relation, index) =>
            connection(relation.id || `relation:${index}`, relation.id1, relation.id2, relation.title)
          );
          elementCount = outline.length;
          connectionCount = connections.length;
        } else if (diagram.type === "stateDiagram") {
          outline = entries(db.getStates()).map(([id, value]) => item("state", id, value));
          connections = values(db.getRelations()).map((relation, index) =>
            connection(`transition:${index}`, relation.id1, relation.id2, relation.relationTitle)
          );
          elementCount = outline.length;
          connectionCount = connections.length;
        } else if (diagram.type === "er") {
          outline = entries(db.getEntities()).map(([id, value]) => item("entity", id, value));
          connections = values(db.getRelationships()).map((relation, index) =>
            connection(`relationship:${index}`, relation.entityA, relation.entityB, relation.roleA)
          );
          elementCount = outline.length;
          connectionCount = connections.length;
        } else if (diagram.type === "mindmap") {
          const stack = [];
          values(db.nodes).forEach((value, index) => {
            const node = item("mindmapNode", value.nodeId || value.id || index, value);
            const level = Number(value.level) || 0;
            while (stack.length && stack[stack.length - 1].level >= level) stack.pop();
            if (stack.length) stack[stack.length - 1].node.children.push(node);
            else outline.push(node);
            stack.push({ level, node });
          });
          elementCount = values(db.nodes).length;
        } else if (diagram.type === "architecture") {
          const groups = entries(db.getGroups()).map(([id, value]) => item("group", id, value));
          const services = entries(db.getServices()).map(([id, value]) => item("service", id, value));
          const junctions = entries(db.getJunctions()).map(([id, value]) => item("junction", id, value));
          const groupById = new Map(groups.map(group => [group.identifier, group]));
          const grouped = new Set();
          entries(db.getGroups()).forEach(([id, value]) => {
            const parent = groupById.get(parentIdentifier(value));
            const group = groupById.get(String(id));
            if (parent && group) {
              parent.children.push(group);
              grouped.add(group.id);
            }
          });
          [...entries(db.getServices()), ...entries(db.getJunctions())].forEach(([id, value]) => {
            const parent = groupById.get(parentIdentifier(value));
            const child = [...services, ...junctions].find(candidate => candidate.identifier === String(id));
            if (parent && child) {
              parent.children.push(child);
              grouped.add(child.id);
            }
          });
          outline = [...groups, ...services, ...junctions].filter(candidate => !grouped.has(candidate.id));
          connections = values(db.getEdges()).map((edge, index) =>
            connection(`edge:${index}`, edge.lhsId, edge.rhsId, edge.title)
          );
          elementCount = groups.length + services.length + junctions.length;
          connectionCount = connections.length;
        }

        return {
          diagramType: diagram.type,
          elementCount,
          connectionCount,
          outline,
          connections,
          issues: []
        };
      };

      window.Meditor = {
        async render(request) {
          try {
            interactive = request.interactive !== false;
            highlightable = request.highlightable === true;
            document.body.classList.toggle("static", !interactive);
            document.body.classList.toggle("presentation", highlightable);
            graph.style.opacity = "0";
            mermaid.initialize({
              startOnLoad: false,
              securityLevel: "strict",
              theme: request.theme,
              suppressErrorRendering: true
            });
            await mermaid.parse(request.code);
            const diagramType = mermaid.detectType(request.code);
            const analysis = normalizeAnalysis(await mermaid.mermaidAPI.getDiagramFromText(request.code));
            const rendered = await mermaid.render(`meditor-${request.id}`, request.code);
            graph.innerHTML = rendered.svg;
            graph.querySelectorAll("a").forEach(link => {
              link.removeAttribute("href");
              link.style.pointerEvents = "none";
            });
            graph.style.opacity = "1";
            const svg = graph.querySelector("svg");
            const size = dimensions(svg);
            naturalWidth = size.width;
            naturalHeight = size.height;
            svg.removeAttribute("width");
            svg.removeAttribute("height");
            svg.style.maxWidth = "none";
            svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
            clearHighlight();
            prepareHighlights();
            if (!hasRendered || request.fitAfterRender === true) {
              fit(1.15);
              hasRendered = true;
            } else {
              transform();
            }
            requestAnimationFrame(() => { graph.style.opacity = "1"; });
            post({
              id: request.id,
              success: true,
              svg: rendered.svg,
              diagramType,
              analysis,
              width: size.width,
              height: size.height
            });
          } catch (error) {
            if (request.clearOnError === true) window.Meditor.clear();
            const location = errorLocation(error);
            post({
              id: request.id,
              success: false,
              message: errorMessage(error),
              line: location.line,
              column: location.column
            });
          }
        },
        clear() {
          graph.innerHTML = "";
          naturalWidth = 0;
          naturalHeight = 0;
          hasRendered = false;
          scale = 1;
          offsetX = 0;
          offsetY = 0;
          clearHighlight();
        },
        zoomBy(factor) {
          scale = Math.max(0.08, Math.min(6, scale * factor));
          transform();
        },
        fit() {
          fit(1.15);
        },
        clearHighlight,
        metrics() {
          const svg = graph.querySelector("svg");
          const rect = svg ? svg.getBoundingClientRect() : null;
          return {
            scale,
            naturalWidth,
            naturalHeight,
            displayedWidth: rect ? rect.width : 0,
            displayedHeight: rect ? rect.height : 0,
            viewportWidth: window.innerWidth,
            viewportHeight: window.innerHeight,
            interactive,
            highlightable,
            highlightTargetCount: graph.querySelectorAll(".meditor-highlight-target").length,
            highlightedCount: graph.querySelectorAll(".meditor-highlighted").length
          };
        }
      };

      window.addEventListener("wheel", event => {
        if (!interactive) return;
        postInteraction();
        event.preventDefault();
        if (event.metaKey || event.ctrlKey) {
          const factor = event.deltaY < 0 ? 1.08 : 0.92;
          window.Meditor.zoomBy(factor);
        } else {
          offsetX -= event.deltaX;
          offsetY -= event.deltaY;
          scheduleTransform();
        }
      }, { passive: false });

      window.addEventListener("pointerdown", event => {
        if (!interactive) return;
        dragging = true;
        pointerX = event.clientX;
        pointerY = event.clientY;
        movedSincePointerDown = false;
        document.body.classList.add("dragging");
      });
      window.addEventListener("pointermove", event => {
        postInteraction();
        if (!interactive || !dragging) return;
        const deltaX = event.clientX - pointerX;
        const deltaY = event.clientY - pointerY;
        if (Math.abs(deltaX) + Math.abs(deltaY) > 2) movedSincePointerDown = true;
        offsetX += deltaX;
        offsetY += deltaY;
        pointerX = event.clientX;
        pointerY = event.clientY;
        scheduleTransform();
      });
      window.addEventListener("pointerup", event => {
        if (!interactive) return;
        dragging = false;
        document.body.classList.remove("dragging");
        if (highlightable && !movedSincePointerDown) {
          highlight(event.target.closest(".meditor-highlight-target"));
        }
      });
      window.addEventListener("dblclick", () => {
        if (interactive) window.Meditor.fit();
      });
      window.addEventListener("resize", () => {
        if (hasRendered) window.Meditor.fit();
      });

      transform();
      post({ event: "ready" });
    })();
  </script>
</body>
</html>
