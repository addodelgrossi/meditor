<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Meditor, a native Mermaid editor for macOS</title>
  <desc id="desc">Meditor logo beside a Mermaid source editor and rendered diagram.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111426"/>
      <stop offset="1" stop-color="#070910"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#62e1ef"/>
      <stop offset="1" stop-color="#766cff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000" flood-opacity=".5"/>
    </filter>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#68708a" fill-opacity=".2"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="120" cy="70" r="300" fill="#6956ff" opacity=".14"/>
  <circle cx="1080" cy="570" r="320" fill="#38cbe5" opacity=".11"/>

  <g transform="translate(70 70)">
    <rect width="74" height="74" rx="20" fill="#1c2236" stroke="#6871a4" stroke-width="2"/>
    <path d="M19 20v38M19 20l18 21 18-21M55 20v38M19 58h36" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#fff"><circle cx="19" cy="20" r="5"/><circle cx="19" cy="58" r="5"/><circle cx="37" cy="41" r="5"/><circle cx="55" cy="20" r="5"/><circle cx="55" cy="58" r="5"/></g>
  </g>

  <text x="70" y="225" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="750" letter-spacing="-4">Meditor</text>
  <text x="70" y="290" fill="#c4c9da" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="27">Native Mermaid editor for macOS.</text>
  <text x="70" y="350" fill="#8d96b1" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18">Write · preview · inspect · export · present</text>

  <g filter="url(#shadow)" transform="translate(575 75)">
    <rect width="555" height="480" rx="22" fill="#111520" stroke="#ffffff" stroke-opacity=".16"/>
    <rect width="555" height="54" rx="22" fill="#202535"/>
    <rect y="32" width="555" height="22" fill="#202535"/>
    <circle cx="26" cy="27" r="6" fill="#ff5f57"/><circle cx="47" cy="27" r="6" fill="#febc2e"/><circle cx="68" cy="27" r="6" fill="#28c840"/>
    <text x="277" y="33" text-anchor="middle" fill="#e9eaf2" font-family="-apple-system, sans-serif" font-size="12" font-weight="650">product-flow.mmd</text>
    <rect y="54" width="255" height="426" fill="#171b26"/>
    <rect x="255" y="54" width="300" height="426" fill="#0e111a"/>
    <rect x="255" y="54" width="300" height="426" fill="url(#dots)"/>
    <g fill="#c8ccda" font-family="SFMono-Regular, Menlo, monospace" font-size="11">
      <text x="24" y="94" fill="#c69bff">flowchart LR</text>
      <text x="24" y="122">Idea([Idea]) --&gt; Draft[Draft]</text>
      <text x="24" y="150">Draft --&gt; Review{Ready?}</text>
      <text x="24" y="178">Review -- Yes --&gt; Ship</text>
    </g>
    <g fill="#1e2433" stroke-width="2">
      <rect x="286" y="242" width="80" height="48" rx="24" stroke="#8f80ff"/>
      <rect x="398" y="242" width="80" height="48" rx="8" stroke="#62e1ef"/>
      <path d="M374 266h16" stroke="url(#accent)"/>
      <path d="M385 260l8 6-8 6" fill="none" stroke="#b8b1ff"/>
      <text x="326" y="271" text-anchor="middle" fill="#fff" stroke="none" font-family="-apple-system, sans-serif" font-size="12">Idea</text>
      <text x="438" y="271" text-anchor="middle" fill="#fff" stroke="none" font-family="-apple-system, sans-serif" font-size="12">Diagram</text>
    </g>
  </g>
</svg>
