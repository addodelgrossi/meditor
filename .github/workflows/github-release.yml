name: Publish Tagged GitHub Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to build and notarize without publishing
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: github-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and notarize DMG
    runs-on: macos-26
    environment: app-store-connect
    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Select Xcode 26.5
        run: sudo xcode-select --switch /Applications/Xcode_26.5.app/Contents/Developer

      - name: Read release version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$REQUESTED_VERSION"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release versions must use the format 1.2.3: $version" >&2
            exit 2
          fi

          echo "MARKETING_VERSION=$version" >>"$GITHUB_ENV"
          echo "BUILD_NUMBER=$GITHUB_RUN_NUMBER" >>"$GITHUB_ENV"

      - name: Install release tools
        env:
          HOMEBREW_REQUIRE_TAP_TRUST: "1"
        run: brew install xcodegen ripgrep

      - name: Run tests
        run: swift test

      - name: Configure App Store Connect API key
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          for name in APP_STORE_CONNECT_API_KEY_ID APP_STORE_CONNECT_API_ISSUER_ID APP_STORE_CONNECT_API_KEY_P8; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing GitHub secret: $name" >&2
              exit 2
            fi
          done

          key_path="$RUNNER_TEMP/app-store-connect-api-key.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" >"$key_path"
          chmod 600 "$key_path"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$key_path" >>"$GITHUB_ENV"

      - name: Configure Developer ID certificate
        shell: bash
        env:
          DEVELOPER_ID_CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          for name in DEVELOPER_ID_CERTIFICATE_P12_BASE64 DEVELOPER_ID_CERTIFICATE_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing GitHub secret: $name" >&2
              exit 2
            fi
          done

          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          keychain_path="$RUNNER_TEMP/developer-id.keychain-db"
          keychain_password="$(openssl rand -base64 36)"

          printf '%s' "$DEVELOPER_ID_CERTIFICATE_P12_BASE64" | base64 --decode >"$certificate_path"
          chmod 600 "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -A \
            -f pkcs12
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db
          security find-identity -v -p codesigning "$keychain_path" |
            grep -F 'Developer ID Application: ADDO DEL GROSSI (QHURUB34Z9)'

          echo "DEVELOPER_ID_CERTIFICATE_PATH=$certificate_path" >>"$GITHUB_ENV"
          echo "DEVELOPER_ID_KEYCHAIN_PATH=$keychain_path" >>"$GITHUB_ENV"

      - name: Create and verify notarized DMG
        run: ./script/package_github_release.sh

      - name: Remove signing credentials
        if: always()
        run: |
          security delete-keychain "$DEVELOPER_ID_KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$DEVELOPER_ID_CERTIFICATE_PATH" "$APP_STORE_CONNECT_API_KEY_PATH"

      - name: Upload verified release assets
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: github-release-assets
          path: |
            dist/Meditor-*.dmg
            dist/Meditor-*.dmg.sha256
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: github-release-assets
          path: dist

      - name: Publish GitHub Release
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          dmg="dist/Meditor-$version.dmg"
          checksum="$dmg.sha256"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$dmg" "$checksum" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$dmg" "$checksum" \
              --verify-tag \
              --generate-notes \
              --title "Meditor $version"
          fi
